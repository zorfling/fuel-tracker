      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Fuel pump body -->
  <rect x="128" y="140" width="180" height="240" rx="24" fill="#0f172a" opacity="0.85"/>
